const matchFileToCourse = (fileEntry, courses) => {
  if (!courses || courses.length === 0) return { courseCode: 'NA', courseName: 'NA' };
  const searchText = [
    fileEntry.name || '', fileEntry.path || '', fileEntry.summary || '', ...(fileEntry.tags || [])
  ].join(' ').toLowerCase();
  for (const course of courses) {
    const cName = (course.name || '').toLowerCase();
    const cCode = (course.code || '').toLowerCase();
    if (cCode && searchText.includes(cCode)) return { courseCode: course.code, courseName: course.name };
    if (cName && cName.length > 2 && searchText.includes(cName)) return { courseCode: course.code, courseName: course.name };
    const words = cName.split(/\s+/).filter(w => w.length > 2);
    if (words.length > 0) {
      const hits = words.filter(w => searchText.includes(w)).length;
      if (hits >= Math.ceil(words.length * 0.6)) return { courseCode: course.code, courseName: course.name };
    }
  }
  return { courseCode: 'NA', courseName: 'NA' };
};

      fr.onerror = () => r('');

};

const simpleMarkdown = md => {
  if (!md) return '';
  let h = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  h = h.replace(/^### (.+)$/gm, '<h3 class="text-lg font-bold mt-4 mb-2 text-slate-800">$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2 class="text-xl font-bold mt-5 mb-2 text-slate-800">$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1 class="text-2xl font-bold mt-6 mb-3 text-slate-800">$1</h1>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong class="font-bold">$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/^- (.+)$/gm, '<li class="ml-4 list-disc text-slate-700">$1</li>');
  h = h.replace(/^(\d+)\. (.+)$/gm, '<li class="ml-4 list-decimal text-slate-700">$2</li>');
  h = h.replace(/\n{2,}/g, '<br/><br/>');
  h = h.replace(/\n/g, '<br/>');
  return h;
};

const getSubjectAbbr = (name) => {
  const lower = name.toLowerCase().trim();
  for (const [key, val] of Object.entries(SUBJECT_ABBR_MAP)) {
    if (lower.includes(key)) return val;
  }
  return name.replace(/[^a-zA-Z]/g, '').substring(0, 3).toUpperCase() || 'GEN';
};

const generateCourseCode = (courseName, level, existingCodes) => {
  const abbr = getSubjectAbbr(courseName);
  const prefix = LEVEL_PREFIX_MAP[level] || 'g';
  let seq = 1;
  const pattern = new RegExp(`^${abbr}_${prefix}(\\d+)$`);
  existingCodes.forEach(code => {
    const m = code.match(pattern);
    if (m) { const n = parseInt(m[1]); if (n >= seq) seq = n + 1; }
  });
  let code = `${abbr}_${prefix}${String(seq).padStart(3, '0')}`;
  while (existingCodes.includes(code)) {
    seq++;
    code = `${abbr}_${prefix}${String(seq).padStart(3, '0')}`;
  }
  return code;
};
